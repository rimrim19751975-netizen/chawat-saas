services:
  - type: web
    name: chawat-saas
    runtime: node
    plan: free
    nodeVersion: 20
    buildCommand: cd frontend && npm install && npx vite build && cd ../backend && npm install
    startCommand: node backend/server.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
